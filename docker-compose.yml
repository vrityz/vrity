name: vrity

services:
  postgres:
    image: postgres:16-alpine
    container_name: vrity-postgres
    environment:
      POSTGRES_DB: ${VRITY_DB_NAME:-vrity}
      POSTGRES_USER: ${VRITY_DB_USER:-vrity}
      POSTGRES_PASSWORD: ${VRITY_DB_PASS:-vrity}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB']
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: vrity-redis
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 20

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: vrity-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${VRITY_RMQ_USER:-vrity}
      RABBITMQ_DEFAULT_PASS: ${VRITY_RMQ_PASS:-vrity}
      # optional tuning
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: '-rabbit disk_free_limit 2147483648'
    ports:
      - '5672:5672' # AMQP
      - '15672:15672' # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 5s
      timeout: 5s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-01-20T00-00-00Z
    container_name: vrity-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${VRITY_S3_ACCESS_KEY:-vrity}
      MINIO_ROOT_PASSWORD: ${VRITY_S3_SECRET_KEY:-vritysecret}
    ports:
      - '9000:9000' # S3
      - '9001:9001' # Console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'sh', '-c', 'wget -qO- http://localhost:9000/minio/health/live >/dev/null 2>&1']
      interval: 5s
      timeout: 5s
      retries: 20

  # One-time init: tạo bucket + policy local
  minio_init:
    image: minio/mc:RELEASE.2025-01-17T00-00-00Z
    container_name: vrity-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${VRITY_S3_ACCESS_KEY:-vrity} ${VRITY_S3_SECRET_KEY:-vritysecret} &&
      mc mb -p local/${VRITY_S3_BUCKET:-vrity-artifacts} || true &&
      mc anonymous set download local/${VRITY_S3_BUCKET:-vrity-artifacts} || true &&
      echo 'minio init done'
      "
    restart: 'no'

  vrity-api:
    # TODO: đổi image/build theo repo của bạn
    image: ${VRITY_API_IMAGE:-vrity/api:dev}
    container_name: vrity-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio_init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development
      PORT: 8080

      DATABASE_URL: postgresql://${VRITY_DB_USER:-vrity}:${VRITY_DB_PASS:-vrity}@postgres:5432/${VRITY_DB_NAME:-vrity}
      REDIS_URL: redis://redis:6379

      AMQP_URL: amqp://${VRITY_RMQ_USER:-vrity}:${VRITY_RMQ_PASS:-vrity}@rabbitmq:5672

      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${VRITY_S3_REGION:-us-east-1}
      S3_BUCKET: ${VRITY_S3_BUCKET:-vrity-artifacts}
      S3_ACCESS_KEY: ${VRITY_S3_ACCESS_KEY:-vrity}
      S3_SECRET_KEY: ${VRITY_S3_SECRET_KEY:-vritysecret}
      S3_FORCE_PATH_STYLE: 'true'

      # v0.1 invariants
      PUBLISH_BLOCK_ON_CRITICAL: 'true'
      INSTALL_DEFAULT_MAX_SEVERITY: ${VRITY_DEFAULT_MAX_SEVERITY:-HIGH}

      # optional: OTEL
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: vrity-api
      OTEL_TRACES_EXPORTER: ${VRITY_OTEL_TRACES_EXPORTER:-none}
      OTEL_METRICS_EXPORTER: ${VRITY_OTEL_METRICS_EXPORTER:-none}
      OTEL_LOGS_EXPORTER: ${VRITY_OTEL_LOGS_EXPORTER:-none}
    ports:
      - '8080:8080'
    # Nếu bạn dev local bằng source code, bật block dưới và tắt image ở trên
    # build:
    #   context: .
    #   dockerfile: ./apps/api/Dockerfile
    # volumes:
    #   - ./apps/api:/app
    #   - /app/node_modules
    healthcheck:
      test: ['CMD', 'sh', '-c', 'wget -qO- http://localhost:8080/healthz >/dev/null 2>&1']
      interval: 5s
      timeout: 5s
      retries: 30

  vrity-scanner:
    # TODO: đổi image/build theo repo của bạn
    image: ${VRITY_SCANNER_IMAGE:-vrity/scanner:dev}
    container_name: vrity-scanner
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio_init:
        condition: service_completed_successfully
    environment:
      NODE_ENV: development

      DATABASE_URL: postgresql://${VRITY_DB_USER:-vrity}:${VRITY_DB_PASS:-vrity}@postgres:5432/${VRITY_DB_NAME:-vrity}
      AMQP_URL: amqp://${VRITY_RMQ_USER:-vrity}:${VRITY_RMQ_PASS:-vrity}@rabbitmq:5672

      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${VRITY_S3_REGION:-us-east-1}
      S3_BUCKET: ${VRITY_S3_BUCKET:-vrity-artifacts}
      S3_ACCESS_KEY: ${VRITY_S3_ACCESS_KEY:-vrity}
      S3_SECRET_KEY: ${VRITY_S3_SECRET_KEY:-vritysecret}
      S3_FORCE_PATH_STYLE: 'true'

      # scanner settings
      SCAN_CONCURRENCY: ${VRITY_SCAN_CONCURRENCY:-2}
      SCAN_TIMEOUT_MS: ${VRITY_SCAN_TIMEOUT_MS:-600000}
      # optional: OTEL
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4318
      OTEL_SERVICE_NAME: vrity-scanner
      OTEL_TRACES_EXPORTER: ${VRITY_OTEL_TRACES_EXPORTER:-none}
      OTEL_METRICS_EXPORTER: ${VRITY_OTEL_METRICS_EXPORTER:-none}
      OTEL_LOGS_EXPORTER: ${VRITY_OTEL_LOGS_EXPORTER:-none}
    # Nếu scanner cần mount docker socket để scan image (tuỳ hướng bạn làm) thì bật:
    # volumes:
    #   - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  # -------- Optional Observability (profile: obs) --------
  otel-collector:
    profiles: ['obs']
    image: otel/opentelemetry-collector-contrib:0.108.0
    container_name: vrity-otel-collector
    command: ['--config=/etc/otelcol/config.yaml']
    volumes:
      - ./infra/otel-collector.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - '4318:4318' # OTLP HTTP
      - '4317:4317' # OTLP gRPC

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  minio_data:
